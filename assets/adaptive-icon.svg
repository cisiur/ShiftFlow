<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Android Adaptive Icon — foreground layer only.
    Background colour (#0F1623) is set in app.json.

    Android safe zone = 66×66 within a 108×108 grid = ~61% of canvas.
    On a 1024×1024 canvas that means the visually important content
    should sit within a centred 626×626 area (margin ≈ 199 px each side).

    We use r=290 (diameter 580) so the circle fits comfortably inside
    that safe zone with a small breathing gap.
  -->
  <defs>
    <linearGradient id="dayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="nightGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F6EF7"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4F6EF7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <clipPath id="adaptiveCircle">
      <circle cx="512" cy="512" r="290"/>
    </clipPath>
  </defs>

  <!-- Transparent background — Android provides its own via backgroundColor -->

  <!-- Night base -->
  <circle cx="512" cy="512" r="290"
          fill="url(#nightGrad)"
          clip-path="url(#adaptiveCircle)"/>

  <!-- Day yin-yang region (r=290, small-arc r=145) -->
  <path d="M 512,222
           a 145,145 0 0,1 0,290
           a 145,145 0 0,0 0,290
           a 290,290 0 0,1 0,-580
           z"
        fill="url(#dayGrad)"
        clip-path="url(#adaptiveCircle)"/>

  <!-- Night dot in day area -->
  <circle cx="512" cy="367" r="50"
          fill="url(#nightGrad)"
          clip-path="url(#adaptiveCircle)"/>

  <!-- Day dot in night area -->
  <circle cx="512" cy="657" r="50"
          fill="url(#dayGrad)"
          clip-path="url(#adaptiveCircle)"/>

  <!-- Dividing curve highlight -->
  <path d="M 512,222
           a 145,145 0 0,1 0,290
           a 145,145 0 0,0 0,290"
        fill="none"
        stroke="rgba(255,255,255,0.18)"
        stroke-width="4"
        clip-path="url(#adaptiveCircle)"/>

  <!-- Border ring -->
  <circle cx="512" cy="512" r="290"
          fill="none"
          stroke="url(#ringGrad)"
          stroke-width="8"
          opacity="0.7"/>

</svg>
